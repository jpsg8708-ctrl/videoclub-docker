{% extends 'base.html' %}
{% block title %}{{ accion }} pelicula - Videoclub{% endblock %}
{% block content %}
    <h2>{{ accion }} pelicula</h2>

    {% if pelicula %}
        <form method="POST" action="{{ url_for('editar_pelicula', pelicula_id=pelicula.id) }}">
    {% else %}
        <form method="POST" action="{{ url_for('crear_pelicula') }}">
    {% endif %}

        <div class="form-group">
            <label for="titulo">Titulo *</label>
            <input type="text" id="titulo" name="titulo" required
                   value="{{ pelicula.titulo if pelicula else '' }}">
        </div>

        <div class="form-group">
            <label for="director">Director</label>
            <input type="text" id="director" name="director"
                   value="{{ pelicula.director if pelicula and pelicula.director else '' }}">
        </div>

        <div class="form-group">
            <label for="anio">Anio</label>
            <input type="number" id="anio" name="anio" min="1888" max="2100"
                   value="{{ pelicula.anio if pelicula and pelicula.anio else '' }}">
        </div>

        <div class="form-group">
            <label for="genero">Genero</label>
            <input type="text" id="genero" name="genero"
                   value="{{ pelicula.genero if pelicula and pelicula.genero else '' }}">
        </div>

        <div class="form-group">
            <label for="stock">Stock disponible</label>
            <input type="number" id="stock" name="stock" min="0"
                   value="{{ pelicula.stock if pelicula else 1 }}">
        </div>

        <div class="form-group">
            <label for="descripcion">Descripcion</label>
            <textarea id="descripcion" name="descripcion">{{ pelicula.descripcion if pelicula and pelicula.descripcion else '' }}</textarea>
        </div>

        <div class="actions">
            <button class="btn btn-success" type="submit">{{ accion }}</button>
            {% if pelicula %}
                <a class="btn btn-secondary" href="{{ url_for('detalle_pelicula', pelicula_id=pelicula.id) }}">Cancelar</a>
            {% else %}
                <a class="btn btn-secondary" href="{{ url_for('index') }}">Cancelar</a>
            {% endif %}
        </div>
    </form>
{% endblock %}
